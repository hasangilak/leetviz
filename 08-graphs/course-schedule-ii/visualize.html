<script src="../../viz/viz.js"></script>
<script>
Viz.create({
  title: "Course Schedule II",
  subtitle: "#210 В· Medium В· Kahn's algorithm вҖ” emit a valid topological order",
  url: "https://leetcode.com/problems/course-schedule-ii/",
  code: [
    "function findOrder(numCourses, prerequisites) {",
    "  // build adj list + indegree[] from edges prereq -> course",
    "  const queue = [];",
    "  for (let c = 0; c < numCourses; c++)",
    "    if (indegree[c] === 0) queue.push(c);   // no prereqs",
    "  const order = [];",
    "  while (queue.length) {",
    "    const course = queue.shift();",
    "    order.push(course);                     // record it",
    "    for (const next of adj[course])",
    "      if (--indegree[next] === 0) queue.push(next); // unlocked",
    "  }",
    "  return order.length === numCourses ? order : [];",
    "}"
  ],
  build: function (rec) {
    var numCourses = 4;
    var prerequisites = [[1, 0], [2, 0], [3, 1], [3, 2]];

    var adj = [];
    for (var i = 0; i < numCourses; i++) adj.push([]);
    var indegree = new Array(numCourses);
    for (var k = 0; k < numCourses; k++) indegree[k] = 0;
    for (var p = 0; p < prerequisites.length; p++) {
      var course = prerequisites[p][0], prereq = prerequisites[p][1];
      adj[prereq].push(course);
      indegree[course]++;
    }

    var adjStr = adj.map(function (a, i) { return i + "вҶ’[" + a.join(",") + "]"; }).join("  ");

    rec.step({
      line: 2, type: "array", values: indegree.slice(),
      note: "Edges prereqвҶ’course: " + adjStr + ". indegree[course] = prereqs still pending. Same machinery as #207, but we record the completion order.",
      aux: { queue: "[]", order: "[]" }
    });

    var queue = [];
    for (var c = 0; c < numCourses; c++) {
      if (indegree[c] === 0) queue.push(c);
    }
    rec.step({
      line: 5, type: "array", values: indegree.slice(),
      hi: queue.slice(),
      note: "Seed the queue with every indegree-0 course вҖ” only course 0 starts unblocked.",
      aux: { queue: "[" + queue.join(",") + "]", order: "[]" }
    });

    var order = [];
    var head = 0;
    while (head < queue.length) {
      var cur = queue[head++];
      order.push(cur);
      rec.step({
        line: 9, type: "array", values: indegree.slice(),
        pointers: { take: cur }, hi: [cur],
        note: "Take indegree-0 course " + cur + " and append it to the order. Then relax everything it unlocks.",
        aux: { queue: "[" + queue.slice(head).join(",") + "]", order: "[" + order.join(",") + "]" }
      });
      var outs = adj[cur];
      for (var o = 0; o < outs.length; o++) {
        var nx = outs[o];
        indegree[nx]--;
        var unlocked = indegree[nx] === 0;
        if (unlocked) queue.push(nx);
        rec.step({
          line: 11, type: "array", values: indegree.slice(),
          pointers: { take: cur, dep: nx }, hi: [nx], dim: [cur],
          note: "Edge " + cur + "вҶ’" + nx + ": --indegree[" + nx + "] = " + indegree[nx] +
            (unlocked ? ". Hit 0 вҶ’ enqueue " + nx + "." : ". Still > 0, stays blocked."),
          aux: { queue: "[" + queue.slice(head).join(",") + "]", order: "[" + order.join(",") + "]" }
        });
      }
    }

    var ans = order.length === numCourses ? order : [];
    rec.step({
      line: 13, type: "array", values: indegree.slice(),
      note: "All " + numCourses + " courses emitted, so it's a valid topological order: every course appears after its prerequisites.",
      aux: { order: "[" + order.join(",") + "]", answer: "[" + ans.join(",") + "]" }
    });
  }
});
</script>


<script type="text/markdown" id="vz-readme">
## Problem
Return **an order** to take all courses given prerequisites (`[a, b]` = take `b`
before `a`), or `[]` if impossible.

```
2, [[1,0]]                       -> [0, 1]
4, [[1,0],[2,0],[3,1],[3,2]]     -> [0,1,2,3]  (or [0,2,1,3])
2, [[1,0],[0,1]]                 -> []         (cycle)
```

## рҹ§җ In plain English
You have `numCourses` courses labelled `0` to `numCourses - 1`, and each pair `[a, b]` is a **prerequisite** meaning "finish `b` before `a`". Unlike #207 (which just asks yes/no), here you must actually hand back a valid order to take them all вҖ” an ordering where every course comes after its prerequisites. This kind of dependency-respecting order is called a **topological order**. If the prerequisites form a loop (a **cycle**), no such order exists, so return an empty array.

- **You're given:** a number `numCourses` and an array `prerequisites` where each `[a, b]` means "take `b` before `a`".
- **Return:** an array of course labels in a valid order, or `[]` if it's impossible.
- **Rules / guarantees:** any valid ordering is accepted (several may exist); each course appears exactly once.
- **Watch out for:** return `[]` (not a partial list) when a cycle makes ordering impossible; with no prerequisites, any order such as `[0, 1, 2, ...]` is fine.

## The idea рҹ’Ў
This is [Course Schedule (#207)](../course-schedule) but we **output the order**.
That order is a **topological sort** of the dependency graph, produced directly by
**Kahn's algorithm** (BFS on in-degrees):

```
   in-degree(course) = how many prerequisites it still needs

   в‘  queue every course with in-degree 0 (no prereqs)
   в‘Ў pop one вҶ’ append to order вҶ’ for each dependent, in-degree--
                                  any that hit 0 вҶ’ enqueue (now unlocked)
   в‘ў order has all courses вҶ’ valid  |  some stuck (cycle) вҶ’ []
```

## рҹ”— The graph вҖ” `4, [[1,0],[2,0],[3,1],[3,2]]`
Edges point **prereq вҶ’ course** ("0 unlocks 1 and 2", "1 and 2 unlock 3"):

```
            в”Ңв”Җв”Җв–¶ 1 в”Җв”Җв”җ
   0 в”Җв”Җв”Җв”Җв”Җв”Җв”Ө         в”ңв”Җв”Җв–¶ 3
            в””в”Җв”Җв–¶ 2 в”Җв”Җв”ҳ

   in-degrees:  0:0   1:1   2:1   3:2
```

## рҹҺ¬ Frame-by-frame (in-degree table + queue + order)
```
step  pop  in-degrees [0,1,2,3]   queue        order
в”Җв”Җв”Җв”Җ  в”Җв”Җв”Җ  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ   в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
init   вҖ“   [0, 1, 1, 2]           [0]          []
 1     0   [_, 0, 0, 2]           [1, 2]       [0]          вҶҗ 0 unlocks 1,2
 2     1   [_, _, 0, 1]           [2]          [0,1]        вҶҗ 3's indeg 2вҶ’1
 3     2   [_, _, _, 0]           [3]          [0,1,2]      вҶҗ 3's indeg 1вҶ’0, enqueue
 4     3   [_, _, _, _]           []           [0,1,2,3]

 order length 4 == numCourses  вҶ’  [0,1,2,3] вң…
```

## рҹ”ҙ A cycle produces no valid order вҖ” `[[1,0],[0,1]]`
```
   0 вҮ„ 1          in-degrees: 0:1  1:1   вҶ’ NOTHING starts at 0
                  queue empty immediately вҶ’ order = [] (length 0 вү  2) вҶ’ [] вң…
```

The popped order *is* the answer: every course emerges only after all its
prerequisites already have.

## Complexity
| | |
|---|---|
| **Time**  | `O(V + E)` вҖ” visit each course and prerequisite once |
| **Space** | `O(V + E)` вҖ” adjacency list + in-degrees + queue + order |

> DFS post-order (record a node after its dependents, then reverse) is an
> equivalent topological sort вҖ” same `O(V+E)`.
