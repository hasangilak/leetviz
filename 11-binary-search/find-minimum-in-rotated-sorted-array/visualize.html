<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Find Minimum in Rotated Sorted Array — Visualizer</title>
<link rel="stylesheet" href="../../viz/viz.css">
</head>
<body>
<script src="../../viz/viz.js"></script>
<script>
Viz.create({
  title: "Find Minimum in Rotated Sorted Array",
  subtitle: "#153 · Medium · binary search for the inflection point",
  url: "https://leetcode.com/problems/find-minimum-in-rotated-sorted-array/",
  code: [
    "function findMin(nums) {",
    "  let lo = 0, hi = nums.length - 1;",
    "  while (lo < hi) {",
    "    const mid = (lo + hi) >>> 1;",
    "    if (nums[mid] > nums[hi]) {",
    "      lo = mid + 1;",
    "    } else {",
    "      hi = mid;",
    "    }",
    "  }",
    "  return nums[lo];",
    "}"
  ],
  build: function (rec) {
    var nums = [4, 5, 6, 7, 0, 1, 2];
    var lo = 0, hi = nums.length - 1;
    var range = function (a, b) { var r = []; for (var i = a; i <= b; i++) r.push(i); return r; };
    rec.step({ line: 2, type: "array", values: nums, pointers: { lo: lo, hi: hi }, note: "The min is the inflection point. Compare nums[mid] to nums[hi] to find which half holds the drop." });
    while (lo < hi) {
      var mid = (lo + hi) >>> 1;
      rec.step({ line: 4, type: "array", values: nums, pointers: { lo: lo, mid: mid, hi: hi }, hi: [mid], note: "mid = (" + lo + " + " + hi + ") >>> 1 = " + mid + "  →  nums[mid] = " + nums[mid] + ", nums[hi] = " + nums[hi] });
      if (nums[mid] > nums[hi]) {
        rec.step({ line: 5, type: "array", values: nums, pointers: { lo: lo, mid: mid, hi: hi }, hi: [mid], dim: range(lo, mid), note: "nums[mid] " + nums[mid] + " > nums[hi] " + nums[hi] + " — the drop is to the RIGHT of mid. Discard lo..mid; lo = " + (mid + 1) + "." });
        lo = mid + 1;
      } else {
        rec.step({ line: 7, type: "array", values: nums, pointers: { lo: lo, mid: mid, hi: hi }, hi: [mid], dim: range(mid + 1, hi), note: "nums[mid] " + nums[mid] + " ≤ nums[hi] " + nums[hi] + " — mid..hi is sorted, so min is at mid or left. Discard (mid..hi]; hi = " + mid + "." });
        hi = mid;
      }
    }
    rec.step({ line: 10, type: "array", values: nums, pointers: { lo: lo }, hi: [lo], note: "lo == hi — the minimum is nums[" + lo + "] = " + nums[lo] + ".", aux: { answer: nums[lo] } });
  }
});
</script>
</body>
</html>
