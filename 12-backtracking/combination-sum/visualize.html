<script src="../../viz/viz.js"></script>
<script>
Viz.create({
  title: "Combination Sum",
  subtitle: "#39 · Medium · Backtracking with reuse — recurse on the same index, prune when remaining < 0",
  url: "https://leetcode.com/problems/combination-sum/",
  code: [
    "function combinationSum(candidates, target) {",
    "  const result = [];",
    "  const current = [];",
    "  const backtrack = (start, remaining) => {",
    "    if (remaining === 0) {",
    "      result.push([...current]);   // exact hit",
    "      return;",
    "    }",
    "    if (remaining < 0) return;     // overshot -> prune",
    "    for (let i = start; i < candidates.length; i++) {",
    "      current.push(candidates[i]);",
    "      backtrack(i, remaining - candidates[i]); // i -> reuse",
    "      current.pop();",
    "    }",
    "  };",
    "  backtrack(0, target);",
    "  return result;",
    "}"
  ],
  build: function (rec) {
    var candidates = [2, 3, 6, 7], target = 7;
    var current = [];
    var results = [];

    var resultsText = function () {
      return "[" + results.map(function (s) { return "[" + s.join(",") + "]"; }).join(", ") + "]";
    };
    var idxs = function () { return current.map(function (_, k) { return k; }); };

    rec.step({
      line: 4, type: "array", values: current.slice(), pointers: {}, hi: [],
      note: "candidates = [2,3,6,7], target = 7. Grow `current`; track how much is still `remaining`. Each candidate may be reused, so the recursion uses the SAME index i (not i+1).",
      aux: { remaining: target, results: resultsText() }
    });

    var backtrack = function (start, remaining) {
      if (remaining === 0) {
        results.push(current.slice());
        rec.step({
          line: 6, type: "array", values: current.slice(), hi: idxs(),
          note: "remaining == 0 → exact hit! Record combination [" + current.join(",") + "] (sums to " + target + ").",
          aux: { remaining: 0, results: resultsText() }
        });
        return;
      }

      var overshoot = [];
      for (var i = start; i < candidates.length; i++) {
        var nextRem = remaining - candidates[i];
        if (nextRem < 0) {
          // pushing candidates[i] would overshoot; the real code pushes, recurses,
          // hits `remaining < 0` and prunes. Collect these to show as one prune step.
          overshoot.push(candidates[i]);
          continue;
        }

        // choose candidates[i]
        current.push(candidates[i]);
        var ptr = {};
        ptr["+" + candidates[i]] = current.length - 1;
        rec.step({
          line: 11, type: "array", values: current.slice(),
          pointers: ptr, hi: [current.length - 1],
          note: "Try candidates[" + i + "] = " + candidates[i] + " → push. current = [" + current.join(",") + "]. remaining becomes " + nextRem + ". (Recurse from index " + i + " — reuse is allowed.)",
          aux: { remaining: nextRem, results: resultsText() }
        });

        // recurse with i (NOT i+1) so candidates[i] can be reused
        backtrack(i, nextRem);

        // un-choose
        var removed = current[current.length - 1];
        current.pop();
        rec.step({
          line: 13, type: "array", values: current.slice(), dim: idxs(),
          note: "Un-choose " + removed + " → pop (backtrack). current = [" + current.join(",") + "]. Continue with the next candidate ≥ index " + i + ".",
          aux: { remaining: remaining, results: resultsText() }
        });
      }

      if (overshoot.length) {
        rec.step({
          line: 9, type: "array", values: current.slice(), dim: idxs(),
          note: "From [" + current.join(",") + "] (remaining = " + remaining + "), candidate(s) " + overshoot.join(", ") + " each push past 0 → remaining < 0, so those branches prune immediately.",
          aux: { remaining: remaining, results: resultsText() }
        });
      }
    };

    backtrack(0, target);

    rec.step({
      line: 18, type: "array", values: current.slice(), pointers: {}, hi: [],
      note: "Done. Combinations summing to " + target + ": " + resultsText() + ".",
      aux: { remaining: target, results: resultsText() }
    });
  }
});
</script>


<script type="text/markdown" id="vz-readme">
## Problem
Return all unique combinations of `candidates` (distinct) that sum to `target`.
Each candidate may be **reused any number of times**.

```
candidates=[2,3,6,7], target=7  ->  [[2,2,3], [7]]
candidates=[2,3,5],   target=8  ->  [[2,2,2,2], [2,3,3], [3,5]]
```

## 🧐 In plain English
Pick numbers from `candidates` so they add up exactly to `target`. A **combination** is just a group of chosen numbers where *order doesn't matter* — `[2,2,3]` and `[3,2,2]` are the same combination, so list it only once. The twist: you may pick the same number as many times as you like.

- **You're given:** an array `candidates` of distinct positive integers and an integer `target`.
- **Return:** every unique combination whose numbers sum to `target`.
- **Rules / guarantees:** each candidate may be **reused** any number of times; candidates are distinct; two combinations differing only in order count as the same.
- **Watch out for:** unlimited reuse means a combination can be longer than the input (e.g. `[2,2,2,2]`); make sure you don't emit reordered duplicates.

## The idea 💡
Backtracking — choose → recurse → un-choose — with two specifics:

```
   ① REUSE allowed
      after picking candidates[i], recurse with the SAME index i (not i+1)
                                    └──────────────┬──────────────┘
                                       so i can be chosen again

   ② NO duplicate combinations
      never go back to an earlier index — only move forward (start)
      → [2,2,3] is found once, never as [2,3,2] or [3,2,2]
```

Track `remaining = target − (chosen so far)`:
- hits **0** → record the combination ✅
- goes **negative** → prune this branch ✂️

## 🌳 The recursion tree — `[2,3,6,7]`, target 7
Each node shows `remaining`. `i↻` = recursing with the same index (reuse).

```
                              rem 7
        ┌──────────┬──────────┬──────────┐
      +2│        +3│        +6│        +7│
        ▼          ▼          ▼          ▼
      rem 5      rem 4      rem 1      rem 0 ✅ [7]
   ┌────┼────┐    │          │
 +2│  +3│  +6│  +3│        ✂ rem 1<smallest reuse
   ▼    ▼    ▼    ▼          (6 only → 6 > 1 → prune)
 rem3  rem2 ✂   rem1
 ┌─┐    │   rem-1  ✂
+2│+3│ +3│   prune
 ▼  ▼   ▼
rem1 rem0  rem-1 ✂
 ✂   ✅      prune
    [2,2,3]

   results: [2,2,3]  and  [7] ✅
```

> The `+3` branch under `rem 4` leads to `rem 1` (then only `≥3` reuse → prune),
> so `-4-` produces nothing. Only the two green ✅ leaves survive.

## ① vs ② in one line
```
  reuse        → recurse(i,   rem − c)     // same index
  no dup combo → loop starts at `start`, never below it
```

## Complexity
Let `T = target`, `m = min(candidates)`:

| | |
|---|---|
| **Time**  | exponential — `O(n^(T/m))` branches worst case |
| **Space** | `O(T/m)` recursion depth (+ output) |

> **#40 Combination Sum II** (use each number once, input has duplicates) switches
> to `i+1` and adds a "skip equal sibling" check to dedupe.
