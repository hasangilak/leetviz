<script src="../../viz/viz.js"></script>
<script>
Viz.create({
  title: "Merge Two Sorted Lists",
  subtitle: "#21 · Easy · two pointers + dummy head — always append the smaller front node",
  url: "https://leetcode.com/problems/merge-two-sorted-lists/",
  code: [
    "function mergeTwoLists(list1, list2) {",
    "  const dummy = new ListNode();",
    "  let tail = dummy;",
    "  while (list1 !== null && list2 !== null) {",
    "    if (list1.val <= list2.val) {",
    "      tail.next = list1;",
    "      list1 = list1.next;",
    "    } else {",
    "      tail.next = list2;",
    "      list2 = list2.next;",
    "    }",
    "    tail = tail.next;",
    "  }",
    "  tail.next = list1 ?? list2;",
    "  return dummy.next;",
    "}"
  ],
  build: function (rec) {
    // l1 = [1,2,4], l2 = [1,3,4]
    var l1 = [1, 2, 4], l2 = [1, 3, 4];
    var i1 = 0, i2 = 0;        // indices into l1 / l2 (the "fronts")
    var out = [];              // the merged OUTPUT array we grow

    // describe a remaining list as "front..rest"
    var rest = function (arr, i) {
      if (i >= arr.length) return "∅";
      var head = arr[i];
      var tailArr = arr.slice(i + 1);
      return tailArr.length ? head + ".." + tailArr.join(",") : String(head);
    };
    var auxOf = function () { return { l1: rest(l1, i1), l2: rest(l2, i2) }; };

    rec.step({
      line: 3, type: "array",
      values: out.slice(),
      pointers: {},
      aux: auxOf(),
      note: "Output starts empty (dummy.next is the answer). We'll always append the smaller front node."
    });

    while (i1 < l1.length && i2 < l2.length) {
      rec.step({
        line: 4, type: "array",
        values: out.slice(),
        pointers: {},
        aux: auxOf(),
        note: "Compare fronts: l1 front = " + l1[i1] + ", l2 front = " + l2[i2] + "."
      });
      if (l1[i1] <= l2[i2]) {
        out.push(l1[i1]);
        rec.step({
          line: 5, type: "array",
          values: out.slice(),
          pointers: { last: out.length - 1 },
          hi: [out.length - 1],
          aux: { l1: rest(l1, i1 + 1), l2: rest(l2, i2) },
          note: "l1 front " + l1[i1] + " <= l2 front " + l2[i2] + " → pick " + l1[i1] + " from l1, advance l1."
        });
        i1++;
      } else {
        out.push(l2[i2]);
        rec.step({
          line: 8, type: "array",
          values: out.slice(),
          pointers: { last: out.length - 1 },
          hi: [out.length - 1],
          aux: { l1: rest(l1, i1), l2: rest(l2, i2 + 1) },
          note: "l2 front " + l2[i2] + " < l1 front " + l1[i1] + " → pick " + l2[i2] + " from l2, advance l2."
        });
        i2++;
      }
    }

    // attach whatever remains of the non-empty list, whole
    var leftover = i1 < l1.length ? l1.slice(i1) : l2.slice(i2);
    var which = i1 < l1.length ? "l1" : "l2";
    for (var k = 0; k < leftover.length; k++) out.push(leftover[k]);
    rec.step({
      line: 14, type: "array",
      values: out.slice(),
      pointers: {},
      hi: leftover.map(function (_, k) { return out.length - leftover.length + k; }),
      aux: auxOf(),
      note: leftover.length
        ? "One list is empty; " + which + " is already sorted → attach its remaining " + leftover.join(",") + " whole."
        : "Both lists are empty — nothing left to attach."
    });

    rec.step({
      line: 15, type: "array",
      values: out.slice(),
      pointers: {},
      aux: { result: out.join(",") },
      note: "Return dummy.next → the merged sorted list [" + out.join(",") + "]."
    });
  }
});
</script>


<script type="text/markdown" id="vz-readme">
## Problem
Merge two **sorted** linked lists into one sorted list by splicing nodes.

```
list1: 1 → 2 → 4
list2: 1 → 3 → 4
merged: 1 → 1 → 2 → 3 → 4 → 4
```

## 🧐 In plain English
A *linked list* is a chain of nodes, each holding a value and a `next` pointer to the following node. You get two such chains that are each already in increasing order, and you must weave them into one single chain that is also in increasing order — by rerouting the existing nodes' pointers, not by copying values.

- **You're given:** `list1` and `list2`, the head nodes of two lists already sorted ascending (either may be `null`/empty).
- **Return:** the head of one merged list containing all nodes, sorted ascending.
- **Rules / guarantees:** both inputs are already sorted; you splice (reconnect) the existing nodes rather than creating new ones.
- **Watch out for:** either list can be empty, and duplicate values across the two lists are fine — just keep everything in order.

## The idea 💡
This is the **merge step of merge-sort**. Compare the two front nodes, append the
smaller to your result, advance that list, repeat. When one list empties, append
whatever's left of the other (it's already sorted).

### The dummy-node trick
Picking the first node is awkward — which list's head wins? A **dummy** sentinel
sidesteps it: always append to `tail`, and return `dummy.next` at the end. No
special case for the head.

## Walkthrough
```
dummy → ∅            l1: 1 2 4     l2: 1 3 4

1 ≤ 1 -> take l1(1)   dummy→1                 l1: 2 4   l2: 1 3 4
1 < 2 -> take l2(1)   dummy→1→1               l1: 2 4   l2: 3 4
2 ≤ 3 -> take l1(2)   dummy→1→1→2             l1: 4     l2: 3 4
3 < 4 -> take l2(3)   dummy→1→1→2→3           l1: 4     l2: 4
4 ≤ 4 -> take l1(4)   dummy→1→1→2→3→4         l1: ∅     l2: 4
l1 empty -> attach l2: dummy→1→1→2→3→4→4

return dummy.next = 1→1→2→3→4→4
```

## Why `<=` and not `<`?
Using `<=` keeps the merge **stable** (equal values keep list1-before-list2
order). Not required here, but a good habit.

## Complexity
| | |
|---|---|
| **Time**  | `O(n + m)` — each node visited once |
| **Space** | `O(1)` — relinks existing nodes; nothing new allocated |
