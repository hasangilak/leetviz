<script src="../../viz/viz.js"></script>
<script>
Viz.create({
  title: "Linked List Cycle",
  subtitle: "#141 · Easy · Floyd's tortoise & hare — slow +1, fast +2, they collide inside a loop",
  url: "https://leetcode.com/problems/linked-list-cycle/",
  code: [
    "function hasCycle(head) {",
    "  let slow = head;",
    "  let fast = head;",
    "  while (fast !== null && fast.next !== null) {",
    "    slow = slow.next;",
    "    fast = fast.next.next;",
    "    if (slow === fast) return true;",
    "  }",
    "  return false;",
    "}"
  ],
  build: function (rec) {
    // 3 -> 2 -> 0 -> -4 -> (back to 2)   has a cycle
    var vals = [3, 2, 0, -4];
    var nodes = vals.map(function (v, i) { return { id: i, val: v }; });
    var next = { 0: 1, 1: 2, 2: 3, 3: 1 }; // last node (-4, id 3) loops back to id 1 (value 2)
    var label = function (id) { return id == null ? "null" : String(vals[id]); };
    // rebuild arrows from current next-pointers each step; the back-edge from -4 to id 1 draws the cycle
    var arrows = function () { return nodes.map(function (n) { return { from: n.id, to: next[n.id] }; }); };

    var slow = 0, fast = 0, stepNo = 0;

    rec.step({
      line: 2, type: "list", nodes: nodes, arrows: arrows(),
      pointers: { slow: slow, fast: fast }, hi: [slow],
      aux: { step: stepNo },
      note: "Both pointers start at head (3). Node -4's next loops back to 2 → there is a cycle."
    });

    // while (fast !== null && fast.next !== null)
    while (fast !== null && next[fast] !== null) {
      stepNo++;
      slow = next[slow];               // slow = slow.next
      rec.step({
        line: 5, type: "list", nodes: nodes, arrows: arrows(),
        pointers: { slow: slow, fast: fast }, hi: [slow],
        aux: { step: stepNo },
        note: "slow = slow.next → slow now at " + label(slow) + " (moved 1)."
      });
      fast = next[next[fast]];         // fast = fast.next.next
      rec.step({
        line: 6, type: "list", nodes: nodes, arrows: arrows(),
        pointers: { slow: slow, fast: fast }, hi: [fast],
        aux: { step: stepNo },
        note: "fast = fast.next.next → fast now at " + label(fast) + " (moved 2)."
      });
      if (slow === fast) {
        rec.step({
          line: 7, type: "list", nodes: nodes, arrows: arrows(),
          pointers: { slow: slow, fast: fast }, hi: [slow],
          aux: { step: stepNo, met: "yes" },
          note: "slow === fast at " + label(slow) + " — they collided! Inside the loop the gap shrinks by 1 each step, so they must meet → return true."
        });
        return;
      }
      rec.step({
        line: 7, type: "list", nodes: nodes, arrows: arrows(),
        pointers: { slow: slow, fast: fast },
        aux: { step: stepNo, met: "no" },
        note: "slow (" + label(slow) + ") !== fast (" + label(fast) + ") yet — keep looping."
      });
    }
  }
});
</script>


<script type="text/markdown" id="vz-readme">
## Problem
Does the linked list contain a **cycle** (a node whose `next` revisits an earlier
node)? Return `true`/`false`.

```
3 → 2 → 0 → -4
    ↑_________|        -> true (tail links back to node 2)

1 → 2 → null           -> false
```

## 🧐 In plain English
A *linked list* is a chain of nodes where each node points to the `next` one. Normally the chain ends at `null`, but here some node's `next` might loop back to an earlier node, creating an endless circle — a *cycle*. Your job is just to detect whether such a loop exists, not to find or fix it.

- **You're given:** `head`, the first node of a linked list.
- **Return:** `true` if following `next` pointers ever loops forever, `false` if it eventually reaches `null`.
- **Rules / guarantees:** there's at most one cycle; you only report yes/no.
- **Watch out for:** don't actually walk forever on a cyclic list — and an empty list or one that ends in `null` is simply `false`.

## Two ways to solve it

| Approach | Time | Space |
|----------|------|-------|
| Hash set of visited nodes | `O(n)` | `O(n)` |
| **Floyd's two pointers** | `O(n)` | **`O(1)`** ✅ |

## The idea 💡 (tortoise & hare)
Run two pointers: `slow` moves 1 node per step, `fast` moves 2.

- **No cycle** → `fast` falls off the end (`null`) and we return `false`.
- **Cycle** → both get trapped in the loop. Because `fast` gains exactly **1
  step on `slow` every iteration**, the gap between them shrinks 1 at a time and
  must hit 0 — they collide. You can't leap over someone when you only close the
  gap by one each step.

## Walkthrough (cycle case)
```
list: 3 → 2 → 0 → -4 ↘ (back to 2)

         slow   fast
init      3      3
step1     2      0
step2     0      2      (fast wrapped around)
step3    -4     -4      slow == fast  -> cycle! ✅
```

## Complexity
| | |
|---|---|
| **Time**  | `O(n)` — fast pointer traverses ≤ 2n nodes before meeting/ending |
| **Space** | `O(1)` — two pointers only |

> 💡 The same trick (advance a second pointer once they meet) finds the cycle's
> **entry node** — that's LeetCode #142, *Linked List Cycle II*.
