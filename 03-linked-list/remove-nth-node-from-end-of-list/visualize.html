<script>
Viz.create({
  title: "Remove Nth Node From End of List",
  subtitle: "#19 В· Medium В· one pass вҖ” open an n-gap with fast, then move both until fast hits the end",
  url: "https://leetcode.com/problems/remove-nth-node-from-end-of-list/",
  code: [
    "function removeNthFromEnd(head, n) {",
    "  const dummy = new ListNode(0, head);",
    "  let fast = dummy;",
    "  let slow = dummy;",
    "  for (let i = 0; i < n; i++) fast = fast.next;",
    "  while (fast.next !== null) {",
    "    fast = fast.next;",
    "    slow = slow.next;",
    "  }",
    "  slow.next = slow.next.next;",
    "  return dummy.next;",
    "}"
  ],
  build: function (rec) {
    // [1,2,3,4,5], n = 2  ->  remove the 4 (2nd from end)  ->  [1,2,3,5]
    var n = 2;
    var vals = ["d", 1, 2, 3, 4, 5]; // id 0 = dummy
    var nodes = vals.map(function (v, i) { return { id: i, val: v }; });
    var next = {};
    nodes.forEach(function (nd, i) { next[nd.id] = i + 1 < nodes.length ? i + 1 : null; });
    var arrows = function () { return nodes.map(function (nd) { return { from: nd.id, to: next[nd.id] }; }); };
    var label = function (id) { return id == null ? "null" : String(vals[id]); };

    var fast = 0, slow = 0; // both at dummy

    rec.step({
      line: 4, type: "list", nodes: nodes, arrows: arrows(),
      pointers: { fast: fast, slow: slow }, hi: [slow],
      note: "A dummy 'd' sits before the head so removing the real head is not a special case. fast & slow both start at dummy."
    });

    // PHASE 1: open a gap of n nodes between fast and slow
    for (var k = 0; k < n; k++) {
      fast = next[fast];
      rec.step({
        line: 5, type: "list", nodes: nodes, arrows: arrows(),
        pointers: { fast: fast, slow: slow }, hi: [fast],
        note: "Phase 1 (open the gap): fast advances to " + label(fast) + ". After this loop fast is n=" + n + " nodes ahead of slow."
      });
    }

    // PHASE 2: advance both until fast is the last node
    while (next[fast] !== null) {
      fast = next[fast];
      slow = next[slow];
      rec.step({
        line: 7, type: "list", nodes: nodes, arrows: arrows(),
        pointers: { fast: fast, slow: slow }, hi: [slow],
        note: "Phase 2 (move together): fast вҶ’ " + label(fast) + ", slow вҶ’ " + label(slow) + ". The n-gap stays fixed."
      });
    }

    rec.step({
      line: 9, type: "list", nodes: nodes, arrows: arrows(),
      pointers: { fast: fast, slow: slow }, hi: [next[slow]],
      note: "fast is the last node, so slow (" + label(slow) + ") sits exactly one node BEFORE the target " + label(next[slow]) + "."
    });

    // unlink: rebuild arrows so the removed node is skipped
    var removed = next[slow];
    next[slow] = next[removed];
    rec.step({
      line: 10, type: "list", nodes: nodes, arrows: arrows(),
      pointers: { slow: slow }, hi: [slow],
      note: "slow.next = slow.next.next вҶ’ unlink " + label(removed) + ". " + label(slow) + " now points straight to " + label(next[slow]) + "."
    });

    rec.step({
      line: 11, type: "list", nodes: nodes, arrows: arrows(),
      pointers: { head: next[0] },
      aux: { result: "1,2,3,5" },
      note: "Return dummy.next вҶ’ [1,2,3,5]. (The skipped node 4 is now unreachable.)"
    });
  }
});
</script>


<script type="text/markdown" id="vz-readme">
## Problem
Remove the `n`-th node **from the end** in **one pass**; return the head.

```
1 вҶ’ 2 вҶ’ 3 вҶ’ 4 вҶ’ 5,  n = 2   ->   1 вҶ’ 2 вҶ’ 3 вҶ’ 5     (removed the 4)
```

## рҹ§җ In plain English
A *linked list* is a chain of nodes each pointing to the `next` one. You must delete one node, counted from the *back* of the list: "Nth from the end" means the Nth node if you start counting at the tail (1st-from-end is the very last node, 2nd-from-end is the one before it, and so on). After removing it, hand back the start of the chain.

- **You're given:** `head`, the first node of the list, and an integer `n`.
- **Return:** the head of the list with the n-th-from-end node removed.
- **Rules / guarantees:** `n` is always valid (1 вүӨ n вүӨ length); aim to do it in a single pass.
- **Watch out for:** when `n` equals the list's length you're removing the head itself, so the head you return changes вҖ” a dummy node before the head handles this cleanly.

## The idea рҹ’Ў вҖ” a fixed-gap two-pointer
You don't know the length up front, but the problem wants a single pass. Trick:
hold two pointers exactly **`n` apart**, then slide them together. When `fast`
hits the end, `slow` is parked right before the target.

```
   keep a gap of n nodes:
        slow в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ n nodes в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–¶ fast
   when fast reaches the LAST node, slow.next is the node to delete.
```

A **dummy** before the head handles deleting the head itself (then `slow` stays on
the dummy).

## рҹҺ¬ Frame-by-frame вҖ” remove 2nd-from-end of `1вҶ’2вҶ’3вҶ’4вҶ’5`
```
dummy вҶ’ 1 вҶ’ 2 вҶ’ 3 вҶ’ 4 вҶ’ 5 вҶ’ вҲ…

в‘  open the gap: advance fast n=2 steps
   slow                    fast
    в–ј                       в–ј
  dummy вҶ’ 1 вҶ’ 2 вҶ’ 3 вҶ’ 4 вҶ’ 5

в‘Ў slide BOTH until fast is the last node
        slow              fast
         в–ј                 в–ј
  dummy вҶ’ 1 вҶ’ 2 вҶ’ 3 вҶ’ 4 вҶ’ 5

             slow          fast
              в–ј             в–ј... advance...
  dummy вҶ’ 1 вҶ’ 2 вҶ’ 3 вҶ’ 4 вҶ’ 5

                  slow      fast=last  вңӢ stop
                   в–ј         в–ј
  dummy вҶ’ 1 вҶ’ 2 вҶ’ 3 вҶ’ 4 вҶ’ 5

в‘ў unlink:  slow.next = slow.next.next     (3 в”Җв”Җskip 4в”Җв”Җв–¶ 5)
  dummy вҶ’ 1 вҶ’ 2 вҶ’ 3 в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–¶ 5
                        вң— 4
  result: 1 вҶ’ 2 вҶ’ 3 вҶ’ 5 вң…
```

## Why the gap of `n` works
When `fast` sits on the last node, there are exactly `n` nodes from `slow.next`
through `fast` inclusive. So `slow.next` is the `n`-th from the end вҖ” the one to
drop.

## Complexity
| | |
|---|---|
| **Time**  | `O(L)` вҖ” one traversal |
| **Space** | `O(1)` вҖ” two pointers |

> Two-pass alternative: count length `L`, then walk `L вҲ’ n` steps. Simpler, but
> two passes вҖ” the gap trick is the one-pass answer interviewers want.
