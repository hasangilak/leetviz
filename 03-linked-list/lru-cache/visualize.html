<script src="../../viz/viz.js"></script>
<script>
Viz.create({
  title: "LRU Cache",
  subtitle: "#146 · Medium · hash map + doubly linked list — every touch moves a key to the front, evict from the back",
  url: "https://leetcode.com/problems/lru-cache/",
  code: [
    "class LRUCache {",
    "  get(key) {",
    "    const node = this.map.get(key);",
    "    if (node === undefined) return -1;",
    "    this.remove(node); this.addToFront(node);",
    "    return node.value;",
    "  }",
    "  put(key, value) {",
    "    if (this.map.has(key)) { /* update + move front */ }",
    "    if (this.map.size === capacity) /* evict tail.prev */;",
    "    /* new node -> map + addToFront */",
    "  }",
    "}"
  ],
  build: function (rec) {
    var capacity = 2;
    // recency order: index 0 = MOST recent (right after head), last = LEAST recent (before tail)
    // each entry: { key, value }
    var order = [];
    var map = {}; // key -> value, for the aux "map keys present"

    var nextId = 0;
    // stable ids per key so the SVG keeps boxes consistent across steps
    var idOf = {};
    var idFor = function (key) {
      if (idOf[key] == null) idOf[key] = nextId++;
      return idOf[key];
    };

    // Build a list frame from the current recency order.
    // val shown = "k:v"; head is leftmost (most recent), arrows chain to the right.
    function frame(extra) {
      var nodes = order.map(function (e) { return { id: idFor(e.key), val: e.key + ":" + e.value }; });
      var next = {};
      order.forEach(function (e, i) {
        next[idFor(e.key)] = i + 1 < order.length ? idFor(order[i + 1].key) : null;
      });
      var arrows = nodes.map(function (nd) { return { from: nd.id, to: next[nd.id] }; });
      var pointers = {};
      if (order.length) {
        pointers["most"] = idFor(order[0].key);
        pointers["least"] = idFor(order[order.length - 1].key);
      }
      var keysPresent = order.map(function (e) { return e.key; }).join(",") || "∅";
      var f = {
        type: "list", nodes: nodes, arrows: arrows, pointers: pointers,
        aux: { map: keysPresent, size: order.length + "/" + capacity }
      };
      for (var k in extra) f[k] = extra[k];
      return f;
    }

    function indexOfKey(key) {
      for (var i = 0; i < order.length; i++) if (order[i].key === key) return i;
      return -1;
    }
    function moveToFront(key) {
      var i = indexOfKey(key);
      var e = order.splice(i, 1)[0];
      order.unshift(e);
    }

    function get(key) {
      var i = indexOfKey(key);
      if (i === -1) {
        rec.step(frame({ line: 4, note: "get(" + key + "): key not in map → return -1." }));
        return;
      }
      var val = order[i].value;
      moveToFront(key);
      rec.step(frame({
        line: 5, hi: [idFor(key)],
        note: "get(" + key + ") = " + val + ": touch it → move key " + key + " to the front (most recent)."
      }));
    }

    function put(key, value) {
      var i = indexOfKey(key);
      if (i !== -1) {
        order[i].value = value;
        map[key] = value;
        moveToFront(key);
        rec.step(frame({
          line: 9, hi: [idFor(key)],
          note: "put(" + key + "," + value + "): key already present → update value, move to front."
        }));
        return;
      }
      if (order.length === capacity) {
        var lru = order[order.length - 1];
        order.pop();
        delete map[lru.key];
        rec.step(frame({
          line: 10, hi: order.length ? [idFor(order[order.length - 1].key)] : [],
          note: "put(" + key + "," + value + "): cache full (size " + capacity + ") → evict least-recent key " + lru.key + " from the back."
        }));
      }
      order.unshift({ key: key, value: value });
      map[key] = value;
      rec.step(frame({
        line: 11, hi: [idFor(key)],
        note: "Insert new key " + key + " (value " + value + ") at the front as the most recently used."
      }));
    }

    // ops: put(1,1), put(2,2), get(1), put(3,3), get(2), put(4,4), get(1), get(3), get(4)
    put(1, 1);
    put(2, 2);
    get(1);
    put(3, 3); // evicts key 2
    get(2);    // -1
    put(4, 4); // evicts key 1
    get(1);    // -1
    get(3);    // 3
    get(4);    // 4
  }
});
</script>


<script type="text/markdown" id="vz-readme">
## Problem
Build a cache with fixed `capacity` supporting:
- `get(key)` → value, or `-1` if absent.
- `put(key, value)` → insert/update; if over capacity, **evict the least
  recently used** key.

Both must run in **O(1)**.

## 🧐 In plain English
You're building a fixed-size key-value store (a *cache*) that remembers only the most recently used items. "LRU" stands for *Least Recently Used*: once the cache is full and a new item arrives, you throw out whichever key hasn't been touched (read or written) for the longest time to make room.

You implement a class with these operations:
- `LRUCache(capacity)` — create the cache with room for at most `capacity` keys.
- `get(key)` — return the key's value, or `-1` if it isn't stored; reading a key counts as using it (so it becomes "most recent").
- `put(key, value)` — add the key (or overwrite its value); this also marks it most recent, and if that pushes you over `capacity`, evict the least-recently-used key.

- **The hard part:** both `get` and `put` must run in **O(1)** time — so you can't scan the list to find the oldest item or to look up a key.

## The idea 💡
We need two things at once, each O(1):
1. **Look up any key instantly** → a **hash map** `key → node`.
2. **Know the usage order** so we can drop the oldest, and bump a key to
   "newest" on every touch → a **doubly linked list** ordered by recency.

Neither structure alone is enough:
- A map has no order.
- A list has order but O(n) lookup.

Combine them: the map points *into* the list, so we can find a node by key and
then splice it in O(1).

```
map: {1:•, 2:•, 3:•}
                                most recent ──────────────► least recent
list:   head ⇄ [3] ⇄ [1] ⇄ [2] ⇄ tail
        (sentinels remove edge cases when inserting/removing)
```

### Operations
| Op | What happens | Cost |
|----|--------------|------|
| `get(k)` hit | unlink node, move to front, return value | O(1) |
| `get(k)` miss | return -1 | O(1) |
| `put(k,v)` update | overwrite value, move to front | O(1) |
| `put(k,v)` new, room | create node, add to front, map it | O(1) |
| `put(k,v)` new, full | evict node before `tail`, delete from map, add new to front | O(1) |

The node stores its **key** (not just value) so that on eviction we can also
remove it from the map.

## Walkthrough (capacity = 2)
```
put(1,1)   list: 1                 map{1}
put(2,2)   list: 2 ⇄ 1             map{1,2}
get(1)->1  list: 1 ⇄ 2             (1 touched -> front)
put(3,3)   full! evict LRU=2       list: 3 ⇄ 1     map{1,3}
get(2)->-1 (evicted)
put(4,4)   full! evict LRU=1       list: 4 ⇄ 3     map{3,4}
get(1)->-1
get(3)->3  list: 3 ⇄ 4
get(4)->4  list: 4 ⇄ 3
```

## Complexity
| | |
|---|---|
| **Time**  | `O(1)` for both `get` and `put` |
| **Space** | `O(capacity)` — map + list hold at most `capacity` entries |

## Why sentinels (head/tail dummies)?
Without them, inserting into an empty list or removing the last node needs
null-checks. With permanent `head` and `tail` guards, `node.prev` and
`node.next` are **never null** for real nodes — the splicing code stays
branch-free.
