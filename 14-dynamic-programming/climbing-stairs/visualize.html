<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Climbing Stairs — Visualizer</title>
<link rel="stylesheet" href="../../viz/viz.css">
</head>
<body>
<script src="../../viz/viz.js"></script>
<script>
Viz.create({
  title: "Climbing Stairs",
  subtitle: "#70 · Easy · 1-D DP array — it's secretly Fibonacci",
  url: "https://leetcode.com/problems/climbing-stairs/",
  code: [
    "function climbStairs(n) {",
    "  const dp = Array(n + 1).fill(0);",
    "  dp[0] = 1;",
    "  dp[1] = 1;",
    "  for (let i = 2; i <= n; i++) {",
    "    dp[i] = dp[i - 1] + dp[i - 2];",
    "  }",
    "  return dp[n];",
    "}"
  ],
  build: function (rec) {
    var n = 6;
    var dp = []; for (var k = 0; k <= n; k++) dp.push(0);
    var show = function () { return dp.slice(); };

    dp[0] = 1;
    rec.step({
      line: 3, type: "array", values: show(), hi: [0],
      note: "dp[i] = number of distinct ways to reach step i. Base: dp[0] = 1 (one way to stand at the bottom — do nothing).",
      aux: { n: n }
    });
    dp[1] = 1;
    rec.step({
      line: 4, type: "array", values: show(), hi: [1],
      note: "Base: dp[1] = 1 (one way to reach step 1 — a single 1-step). Now every later step is the sum of the two before it.",
      aux: { n: n }
    });

    for (var i = 2; i <= n; i++) {
      dp[i] = dp[i - 1] + dp[i - 2];
      rec.step({
        line: 6, type: "array", values: show(),
        pointers: { i: i, "i−1": i - 1, "i−2": i - 2 },
        hi: [i], dim: [i - 1, i - 2],
        note: "Last move onto step " + i + " was either +1 (from step " + (i - 1) + ") or +2 (from step " + (i - 2) + "). So dp[" + i + "] = dp[" + (i - 1) + "] + dp[" + (i - 2) + "] = " + dp[i - 1] + " + " + dp[i - 2] + " = " + dp[i] + ".",
        aux: { "dp[i-1]": dp[i - 1], "dp[i-2]": dp[i - 2], "dp[i]": dp[i] }
      });
    }

    rec.step({
      line: 8, type: "array", values: show(), hi: [n],
      note: "Answer = dp[" + n + "] = " + dp[n] + " distinct ways to climb " + n + " steps. (The array is the Fibonacci sequence 1,1,2,3,5,8,13.)",
      aux: { answer: dp[n] }
    });
  }
});
</script>
</body>
</html>
