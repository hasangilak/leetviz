<script src="../../viz/viz.js"></script>
<script>
Viz.create({
  title: "Longest Increasing Subsequence",
  subtitle: "#300 · Medium · O(n²) DP — dp[i] = longest run ending at i",
  url: "https://leetcode.com/problems/longest-increasing-subsequence/",
  code: [
    "function lengthOfLIS(nums) {",
    "  const dp = new Array(nums.length).fill(1);",
    "  let best = 1;",
    "  for (let i = 1; i < nums.length; i++) {",
    "    for (let j = 0; j < i; j++) {",
    "      if (nums[j] < nums[i] && dp[j] + 1 > dp[i])",
    "        dp[i] = dp[j] + 1;",
    "    }",
    "    best = Math.max(best, dp[i]);",
    "  }",
    "  return best;",
    "}"
  ],
  build: function (rec) {
    var nums = [10, 9, 2, 5, 3, 7, 101, 18];
    var n = nums.length;
    var dp = []; for (var k = 0; k < n; k++) dp.push(1);
    var best = 1;
    var cL = []; for (var c = 0; c < n; c++) cL.push(c);

    var grid = function () { return [nums.slice(), dp.slice()]; };

    rec.step({
      line: 2, type: "grid", data: grid(), rLabels: ["nums", "dp"], cLabels: cL, corner: "i",
      note: "dp[i] = length of the longest strictly increasing subsequence that ENDS at index i. Every element alone is a run of length 1, so dp starts all 1s.",
      aux: { best: best }
    });

    for (var i = 1; i < n; i++) {
      var extended = 0; // count of earlier elements that grew dp[i]
      for (var j = 0; j < i; j++) {
        var extends_ = nums[j] < nums[i];
        var improves = dp[j] + 1 > dp[i];
        // Surface only the j's that actually grow the run (the meaningful work).
        if (extends_ && improves) {
          dp[i] = dp[j] + 1;
          extended++;
          rec.step({
            line: 7, type: "grid", data: grid(),
            rLabels: ["nums", "dp"], cLabels: cL, corner: "i",
            cur: { r: 1, c: i },
            hi: [{ r: 0, c: j }, { r: 1, c: j }],
            note: "nums[" + j + "]=" + nums[j] + " < nums[" + i + "]=" + nums[i] + ", so " + nums[i] + " can extend the run ending at " + j + " (length dp[" + j + "]=" + dp[j] + "). dp[" + i + "] grows to " + dp[i] + ".",
            aux: { i: i, j: j, "dp[i]": dp[i], best: Math.max(best, dp[i]) }
          });
        }
      }
      best = Math.max(best, dp[i]);
      rec.step({
        line: 9, type: "grid", data: grid(), rLabels: ["nums", "dp"], cLabels: cL, corner: "i",
        cur: { r: 1, c: i },
        note: extended === 0
          ? ("Scanned every j < " + i + ": no earlier element is smaller than nums[" + i + "]=" + nums[i] + ", so dp[" + i + "] stays 1. Running best = " + best + ".")
          : ("Finished scanning j < " + i + ". dp[" + i + "] settles at " + dp[i] + ". Running best = " + best + "."),
        aux: { i: i, "dp[i]": dp[i], best: best }
      });
    }

    rec.step({
      line: 11, type: "grid", data: grid(), rLabels: ["nums", "dp"], cLabels: cL, corner: "i",
      note: "Answer = max(dp) = " + best + " (the subsequence [2, 3, 7, 101] has length 4).",
      aux: { answer: best }
    });
  }
});
</script>


<script type="text/markdown" id="vz-readme">
## Problem
Return the **length** of the longest strictly increasing subsequence.

```
[10,9,2,5,3,7,101,18] -> 4    (e.g. [2,3,7,101])
[7,7,7,7]             -> 1    (strictly increasing, so no repeats)
```

## 🧐 In plain English
A **subsequence** keeps the original left-to-right order but is allowed to *skip*
elements — the chosen numbers don't have to be next to each other. Find the
longest such pick where each number is **strictly larger** than the one before
it, and return how long it is.

- **You're given:** an integer array `nums`.
- **Return:** the *length* of the longest strictly-increasing subsequence (not the subsequence itself).
- **Rules / guarantees:** elements keep their order; you may drop any; "increasing" is strict (equal values can't both be used).
- **Watch out for:** subsequence ≠ subarray — `[2,3,7,101]` is valid for the example even though those values aren't adjacent in the array.

## The idea 💡 — anchor the subsequence at each index
Ask, for every position: *"what's the longest increasing run that **ends** here?"*

```
   ┌────────────────────────────────────────────────────────────┐
   │ STATE       dp[i] = length of longest incr. subseq ending at i │
   │ RECURRENCE  dp[i] = 1 + max( dp[j] )                          │
   │                     over all j < i where nums[j] < nums[i]    │
   │             (just 1 if no smaller element precedes it)        │
   │ ANSWER      max of all dp[i]                                  │
   └────────────────────────────────────────────────────────────┘
```

For each `i`, look back at every earlier `j`: if `nums[j] < nums[i]`, we can tack
`nums[i]` onto that run.

## 📊 Fill the table — `[10, 9, 2, 5, 3, 7, 101, 18]`
Each `dp[i]` = 1 + the best `dp[j]` among smaller earlier values (arrows show the
chosen predecessor):

```
 index:   0    1    2    3    4    5    6    7
 value:  10    9    2    5    3    7  101   18
 dp:      1    1    1    2    2    3    4    4
                         ▲    ▲    ▲    ▲
                         │    │    │    └ 18 > 7   → dp= dp[5]+1 = 4
                         │    │    └ 7 > 5,3,2     → dp= 2+1 = 3
                         │    └ 3 > 2              → dp= 1+1 = 2
                         └ 5 > 2                   → dp= 1+1 = 2

   best = max(dp) = 4   →  e.g. 2 → 3 → 7 → 101 ✅
```

## ⚡ The faster O(n log n) version
Keep a `tails` array where `tails[k]` = smallest possible tail of an increasing
subsequence of length `k+1`. For each number, binary-search the first tail `≥` it
and replace it (or append). The length of `tails` is the answer. That trades this
simple `O(n²)` for `O(n log n)`.

## Complexity
| | |
|---|---|
| **Time**  | `O(n²)` here (`O(n log n)` with the patience-sorting trick) |
| **Space** | `O(n)` — the `dp` array |
