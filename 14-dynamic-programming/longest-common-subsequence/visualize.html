<script src="../../viz/viz.js"></script>
<script>
Viz.create({
  title: "Longest Common Subsequence",
  subtitle: "#1143 · Medium · 2-D string DP — match jumps the diagonal",
  url: "https://leetcode.com/problems/longest-common-subsequence/",
  code: [
    "function longestCommonSubsequence(a, b) {",
    "  const dp = grid(a.length + 1, b.length + 1);  // base row/col = 0",
    "  for (let i = 1; i <= a.length; i++)",
    "    for (let j = 1; j <= b.length; j++)",
    "      if (a[i - 1] === b[j - 1])",
    "        dp[i][j] = dp[i - 1][j - 1] + 1;",
    "      else",
    "        dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);",
    "  return dp[a.length][b.length];",
    "}"
  ],
  build: function (rec) {
    var a = "abcde", b = "ace";
    var m = a.length, n = b.length;
    var dp = [];
    for (var i = 0; i <= m; i++) { dp.push([]); for (var j = 0; j <= n; j++) dp[i].push(null); }
    for (var i2 = 0; i2 <= m; i2++) dp[i2][0] = 0;
    for (var j2 = 0; j2 <= n; j2++) dp[0][j2] = 0;

    var rL = ["∅"].concat(a.split(""));
    var cL = ["∅"].concat(b.split(""));
    var grid = function () { return dp.map(function (row) { return row.slice(); }); };

    rec.step({
      line: 2, type: "grid", data: grid(), rLabels: rL, cLabels: cL, corner: "",
      note: "dp[i][j] = LCS length of prefixes a[0..i) and b[0..j). Base row & column are 0 (an empty prefix shares nothing). Rows = \"" + a + "\", columns = \"" + b + "\".",
      aux: { a: a, b: b }
    });

    for (var r = 1; r <= m; r++) {
      for (var c = 1; c <= n; c++) {
        var match = a[r - 1] === b[c - 1];
        if (match) dp[r][c] = dp[r - 1][c - 1] + 1;
        else dp[r][c] = Math.max(dp[r - 1][c], dp[r][c - 1]);
        rec.step({
          line: match ? 6 : 8, type: "grid", data: grid(), rLabels: rL, cLabels: cL, corner: "",
          cur: { r: r, c: c },
          hi: match ? [{ r: r - 1, c: c - 1 }] : [{ r: r - 1, c: c }, { r: r, c: c - 1 }],
          note: match
            ? ("'" + a[r - 1] + "' = '" + b[c - 1] + "' → extend the common run: dp[" + r + "][" + c + "] = ↖" + dp[r - 1][c - 1] + " + 1 = " + dp[r][c] + ".")
            : ("'" + a[r - 1] + "' ≠ '" + b[c - 1] + "' → drop one char, keep the better: max( ↑" + dp[r - 1][c] + ", ←" + dp[r][c - 1] + " ) = " + dp[r][c] + "."),
          aux: { rowChar: a[r - 1], colChar: b[c - 1], cell: dp[r][c] }
        });
      }
    }

    rec.step({
      line: 9, type: "grid", data: grid(), rLabels: rL, cLabels: cL, corner: "",
      cur: { r: m, c: n },
      note: "Bottom-right cell is the answer: LCS length = " + dp[m][n] + " (the subsequence \"ace\").",
      aux: { answer: dp[m][n] }
    });
  }
});
</script>


<script type="text/markdown" id="vz-readme">
## Problem
Return the **length** of the longest subsequence present in **both** strings.

```
"abcde", "ace" -> 3    ("ace")
"abc",   "def" -> 0
```

## 🧐 In plain English
A **subsequence** keeps order but may drop letters (so `"ace"` is a subsequence of
`"abcde"`). You're looking for the longest string of characters that appears — in
the same order, not necessarily adjacent — inside **both** inputs, and you report
its length.

- **You're given:** two strings `text1` and `text2`.
- **Return:** the length of their longest common subsequence (not the subsequence text).
- **Rules / guarantees:** characters must keep their relative order in both strings; they needn't be contiguous.
- **Watch out for:** subsequence ≠ substring — the common part can be scattered across each string (`"ace"` skips `b` and `d`).

## The idea 💡 — compare prefixes, char by char
Build a table over **prefixes** of the two strings.

```
   ┌──────────────────────────────────────────────────────────────┐
   │ STATE       dp[i][j] = LCS of text1[0..i) and text2[0..j)       │
   │ RECURRENCE  last chars MATCH  → dp[i][j] = dp[i-1][j-1] + 1     │
   │             last chars DIFFER → dp[i][j] = max(dp[i-1][j],      │
   │                                               dp[i][j-1])       │
   │ BASE        empty prefix → 0                                    │
   └──────────────────────────────────────────────────────────────┘
```

- **Match** → both prefixes end in the same char, so it joins the LCS: take the
  **diagonal** answer and add 1.
- **Differ** → at least one of those last chars isn't in the LCS, so drop it: take
  the better of "ignore text1's last char" (up) or "ignore text2's last" (left).

## 📊 Fill the table — `"abcde"` × `"ace"`
↖ = diagonal+1 on a match; otherwise max(↑, ←):

```
            ""   a    c    e
       ┌────────────────────────
   ""  │   0    0    0    0
    a  │   0    1↖   1    1
    b  │   0    1    1    1
    c  │   0    1    2↖   2
    d  │   0    1    2    2
    e  │   0    1    2    3↖   ★

   dp[5][3] = 3   →  the LCS is "ace" ✅
```

Follow the ↖ matches back from the corner: `e` (5,3) → `c` (3,2) → `a` (1,1) =
`"ace"`.

## 👪 This table is a DP workhorse
The exact same prefix-grid solves **Edit Distance**, **Shortest Common
Supersequence**, **Longest Common Substring**, and the diff algorithm behind
`git diff`.

## Complexity
| | |
|---|---|
| **Time**  | `O(m · n)` — fill each cell once |
| **Space** | `O(m · n)` (reducible to `O(min(m, n))` keeping just two rows) |
