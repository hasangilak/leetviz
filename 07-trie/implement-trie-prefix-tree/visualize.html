<script src="../../viz/viz.js"></script>
<script>
Viz.create({
  title: "Implement Trie (Prefix Tree)",
  subtitle: "#208 · Medium · a tree of characters; green ring = end-of-word",
  url: "https://leetcode.com/problems/implement-trie-prefix-tree/",
  code: [
    "insert(word):  walk/create a path of nodes, flag the last node",
    "search(word):  node = walk(word); return node && node.isEnd",
    "startsWith(p): return walk(p) !== null",
    "walk(s): follow chars; null if any child is missing",
    "  for (ch of s) { next = node.children.get(ch);",
    "                  if (!next) return null; node = next; }"
  ],
  build: function (rec) {
    // trie node: { ch, children: {char->node}, isEnd }, root.ch = "•"
    var root = { ch: "•", children: {}, isEnd: false };
    var current = null; // node highlighted as "current"

    // Build the renderer tree from the live trie each step.
    function mk(n) {
      var st = null;
      if (n === current) st = "current";
      else if (n.isEnd) st = "visited"; // green ring = end-of-word marker
      var kids = Object.keys(n.children).sort().map(function (c) { return mk(n.children[c]); });
      return { label: n.ch, state: st, children: kids };
    }
    function snap(line, note, extraAux) {
      var aux = {};
      if (extraAux) for (var key in extraAux) aux[key] = extraAux[key];
      rec.step({ line: line, type: "tree", root: mk(root), note: note, aux: aux });
    }

    function insert(word) {
      current = root;
      snap(1, "insert(\"" + word + "\"): start at the root.");
      var node = root;
      for (var i = 0; i < word.length; i++) {
        var ch = word[i];
        if (!node.children[ch]) {
          node.children[ch] = { ch: ch, children: {}, isEnd: false };
        }
        node = node.children[ch];
        current = node;
        snap(1, "insert(\"" + word + "\"): char '" + ch + "' → step into (creating if needed) the child node '" + ch + "'.");
      }
      node.isEnd = true;
      current = null;
      snap(1, "insert(\"" + word + "\"): reached the end — mark node '" + node.ch + "' as end-of-word (green ring).", { result: "\"" + word + "\" stored" });
    }

    // returns the final node or null
    function walk(s, line, label) {
      current = root;
      snap(line, label + ": start at the root, follow each character.");
      var node = root;
      for (var i = 0; i < s.length; i++) {
        var ch = s[i];
        var next = node.children[ch];
        if (!next) {
          current = node;
          snap(5, label + ": no child '" + ch + "' from here → path breaks, walk returns null.", { found: "no" });
          return null;
        }
        node = next;
        current = node;
        snap(5, label + ": char '" + ch + "' → move into child '" + ch + "'.");
      }
      return node;
    }

    function search(word) {
      var node = walk(word, 2, "search(\"" + word + "\")");
      if (node === null) {
        snap(2, "search(\"" + word + "\") → false (no such path).", { search: false });
        current = null;
        return;
      }
      current = node;
      var ok = node.isEnd;
      snap(2, "search(\"" + word + "\"): path exists; is node '" + node.ch + "' an end-of-word? " + (ok ? "Yes." : "No (it's only a prefix).") + " → " + ok, { search: ok });
      current = null;
    }

    function startsWith(prefix) {
      var node = walk(prefix, 3, "startsWith(\"" + prefix + "\")");
      if (node === null) {
        snap(3, "startsWith(\"" + prefix + "\") → false (path breaks).", { startsWith: false });
        current = null;
        return;
      }
      current = node;
      snap(3, "startsWith(\"" + prefix + "\"): the whole path exists (end-of-word flag irrelevant) → true.", { startsWith: true });
      current = null;
    }

    insert("apple");
    insert("app");
    search("app");    // true (now stored)
    search("apple");  // true
    startsWith("ap"); // true
  }
});
</script>

## Problem
Implement a **trie** with:
- `insert(word)`
- `search(word)` — is this *exact word* stored?
- `startsWith(prefix)` — is any stored word starting with this prefix?

## 🧐 In plain English
You're building a little dictionary that stores words and can answer two kinds of yes/no questions: "is this *exact* word in here?" and "does any stored word *begin with* this string?" A **prefix** is just the leading part of a word (e.g. `"app"` is a prefix of `"apple"`). The "trie" is the special tree structure you build to do this efficiently.

You implement a class with these operations:
- `insert(word)` — add a word to the dictionary.
- `search(word)` — return `true` only if this *whole word* was inserted earlier (not just present as a prefix of something longer).
- `startsWith(prefix)` — return `true` if at least one stored word starts with this prefix.

- **The hard part:** distinguishing a complete stored word from a string that merely happens to be the prefix of another. `search("app")` must be `false` if you only ever inserted `"apple"`, even though the path `a-p-p` exists.

## What is a trie? 🌲
A **trie** (a.k.a. prefix tree) stores strings as a tree where each **edge is a
character**. Words that share a prefix share the same path near the root.

```
insert "apple", "app", "apply":

        (root)
          │ a
          a
          │ p
          p
          │ p
         (p)•          • = end-of-word marker (here: "app")
        ┌─┴─┐
      l │   │ l
        l   l
      e │   │ y
       (e)• (y)•       "apple"      "apply"
```

The shared `a-p-p` path is stored **once**. The `•` (end-of-word flag) is what
distinguishes a stored word from a mere prefix — without it, `search("app")`
couldn't tell that `app` was actually inserted vs. just a prefix of `apple`.

## Operations (all O(L), L = string length)
| Method | Logic |
|--------|-------|
| `insert` | walk the path, creating missing nodes; flag the last node |
| `search` | walk the path; true **only if** it exists *and* the last node is flagged |
| `startsWith` | walk the path; true if it simply exists |

The difference between `search` and `startsWith` is literally one check of the
end-of-word flag.

## Why a trie over a hash set?
A `Set` answers exact `search` in O(L) too — but it **can't do prefix queries**.
A trie does prefix work in O(prefix length) regardless of dictionary size, which
powers autocomplete, spell-check, and IP routing tables.

## Complexity
| | |
|---|---|
| **Time**  | `O(L)` per operation (`L` = word/prefix length) |
| **Space** | `O(total characters inserted)` in the worst case (shared prefixes save space) |
