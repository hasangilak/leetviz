<script src="../../viz/viz.js"></script>
<script>
Viz.create({
  title: "Design Add and Search Words Data Structure",
  subtitle: "#211 · Medium · trie + DFS; '.' wildcard tries every child branch",
  url: "https://leetcode.com/problems/design-add-and-search-words-data-structure/",
  code: [
    "addWord(word): trie insert; flag the final node",
    "search(word):  return dfs(root, 0)",
    "dfs(node, i):",
    "  if (i === word.length) return node.isEnd;",
    "  ch = word[i];",
    "  if (ch === '.')",
    "    for (child of node.children) if (dfs(child, i+1)) return true;",
    "  else next = node.children.get(ch); return next && dfs(next, i+1);"
  ],
  build: function (rec) {
    // trie node: { ch, children: {char->node}, isEnd }, root.ch = "•"
    var root = { ch: "•", children: {}, isEnd: false };
    var current = null; // node highlighted "current"

    function mk(n) {
      var st = null;
      if (n === current) st = "current";
      else if (n.isEnd) st = "visited"; // green ring = end-of-word
      var kids = Object.keys(n.children).sort().map(function (c) { return mk(n.children[c]); });
      return { label: n.ch, state: st, children: kids };
    }
    function snap(line, note, extraAux) {
      var aux = {};
      if (extraAux) for (var key in extraAux) aux[key] = extraAux[key];
      rec.step({ line: line, type: "tree", root: mk(root), note: note, aux: aux });
    }

    function addWord(word) {
      current = root;
      snap(1, "addWord(\"" + word + "\"): walk/create a path from the root.");
      var node = root;
      for (var i = 0; i < word.length; i++) {
        var ch = word[i];
        if (!node.children[ch]) node.children[ch] = { ch: ch, children: {}, isEnd: false };
        node = node.children[ch];
        current = node;
        snap(1, "addWord(\"" + word + "\"): char '" + ch + "' → into child '" + ch + "'.");
      }
      node.isEnd = true;
      current = null;
      snap(1, "addWord(\"" + word + "\"): mark node '" + node.ch + "' end-of-word (green ring).", { stored: "\"" + word + "\"" });
    }

    var word = "";
    // recursive dfs that records steps; returns true/false
    function dfs(node, i) {
      if (i === word.length) {
        current = node;
        var done = node.isEnd;
        snap(4, "Consumed all of \"" + word + "\" at node '" + node.ch + "'. Is it end-of-word? " + (done ? "Yes → match." : "No → dead end."));
        return done;
      }
      var ch = word[i];
      if (ch === ".") {
        var keys = Object.keys(node.children).sort();
        snap(7, "Position " + i + " is '.' (wildcard) at node '" + node.ch + "': try EACH child branch (" + keys.join(", ") + ").");
        for (var ki = 0; ki < keys.length; ki++) {
          var child = node.children[keys[ki]];
          current = child;
          snap(7, "Wildcard '.' branch '" + keys[ki] + "': recurse into it and try to match the rest of \"" + word + "\".");
          if (dfs(child, i + 1)) {
            current = child;
            snap(7, "Branch '" + keys[ki] + "' succeeded — return true immediately (no need to try the rest).", { match: true });
            return true;
          }
          snap(7, "Branch '" + keys[ki] + "' failed; back up and try the next child.");
        }
        snap(7, "No child branch matched at node '" + node.ch + "' → return false.", { match: false });
        return false;
      }
      var next = node.children[ch];
      if (!next) {
        current = node;
        snap(8, "Need child '" + ch + "' but it's missing → return false.", { match: false });
        return false;
      }
      next = node.children[ch];
      current = next;
      snap(8, "Literal char '" + ch + "' → into child '" + ch + "', recurse on the rest.");
      return dfs(next, i + 1);
    }

    function search(w) {
      word = w;
      current = root;
      snap(2, "search(\"" + w + "\"): start DFS at the root, index 0.");
      var ok = dfs(root, 0);
      current = null;
      snap(2, "search(\"" + w + "\") → " + ok + ".", { search: ok });
    }

    addWord("bad");
    addWord("dad");
    addWord("mad");
    search(".ad"); // true — '.' matches the first child (b), whose path spells .ad
  }
});
</script>


<script type="text/markdown" id="vz-readme">
## Problem
Support `addWord(word)` and `search(word)`, where `search` may contain `.`
wildcards that match **any single character**.

```
addWord("bad"); addWord("dad"); addWord("mad");
search("pad") -> false
search("bad") -> true
search(".ad") -> true   (. matches b, d, or m)
search("b..") -> true   (matches "bad")
```

## 🧐 In plain English
You're building a word dictionary you can add to and then query — but the queries are fancier than usual: a search string may contain `.` characters, where each `.` is a **wildcard** that matches *any one* letter. So `search(".ad")` asks "is there any stored word that is exactly 3 letters and ends in `ad`?"

You implement a class with these operations:
- `addWord(word)` — store a word (plain letters only, no wildcards).
- `search(word)` — return `true` if any stored word matches, treating each `.` in `word` as a single-character wildcard.

- **The hard part:** the `.` wildcard. A `.` doesn't pick one letter — it could match *several* different stored letters at that position, so the search has to branch and explore every possible matching path, succeeding if *any* path leads to a complete stored word of the right length.

## The idea 💡
Start from a normal [trie](../implement-trie-prefix-tree). `addWord` is a plain
insert. The twist is `search`:

- A **normal character** → follow that one child (or fail).
- A **`.`** → it could be *any* character, so try **every child** and succeed if
  any branch matches the remaining pattern.

That "try every child" turns search into a **depth-first search** that branches
at each wildcard.

```
search(node, i):
  if i == len(word):  return node.isEndOfWord
  c = word[i]
  if c == '.':  return ANY child d has search(d, i+1) == true
  else:         return child[c] exists AND search(child[c], i+1)
```

## Walkthrough — `search(".ad")` against {bad, dad, mad}
```
i=0 '.'  -> try every child of root: b, d, m
   try b: i=1 'a' -> b→a ok; i=2 'd' -> a→d ok; i=3 end -> isEnd? yes ✅
   (returns true on the first matching branch — "bad")
```

## Walkthrough — `search("..")` (no 2-letter word)
```
i=0 '.' -> branch into b/d/m
   each: i=1 '.' -> branch into their single child (a)
       i=2 end -> isEndOfWord? these are mid-word 'a' nodes -> false
all branches fail -> false ✅
```

## Complexity
Let `L` = pattern length, `d` = number of `.` wildcards.

| | |
|---|---|
| **`addWord`** | `O(L)` |
| **`search`** | `O(L)` with no wildcards; up to `O(26^d · L)` worst case (each `.` may fan out over all children) |
| **Space** | `O(total characters added)` for the trie + `O(L)` recursion depth |
