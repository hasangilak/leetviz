<script src="../../viz/viz.js"></script>
<script>
Viz.create({
  title: "Top K Frequent Elements",
  subtitle: "#347 · Medium · count, then bucket-sort by frequency",
  url: "https://leetcode.com/problems/top-k-frequent-elements/",
  code: [
    "function topKFrequent(nums, k) {",
    "  const freq = new Map();",
    "  for (const n of nums) freq.set(n, (freq.get(n) ?? 0) + 1);",
    "  const buckets = Array.from({length: nums.length + 1}, () => []);",
    "  for (const [num, c] of freq) buckets[c].push(num);",
    "  const result = [];",
    "  for (let f = buckets.length - 1; f >= 0 && result.length < k; f--)",
    "    for (const num of buckets[f]) {",
    "      result.push(num);",
    "      if (result.length === k) break;",
    "    }",
    "  return result;",
    "}"
  ],
  build: function (rec) {
    var nums = [1, 1, 1, 2, 2, 3], k = 2;
    var freq = {};                           // value -> count
    var fmtFreq = function () {
      var parts = [];
      Object.keys(freq).forEach(function (key) { parts.push(key + ":" + freq[key]); });
      return "{" + parts.join(", ") + "}";
    };

    // Phase 1 — count occurrences.
    rec.step({ line: 2, type: "array", values: nums, pointers: {}, note: "Phase 1: count how many times each value appears.", aux: { freq: fmtFreq() } });
    for (var i = 0; i < nums.length; i++) {
      var n = nums[i];
      freq[n] = (freq[n] || 0) + 1;
      rec.step({ line: 3, type: "array", values: nums, pointers: { i: i }, hi: [i], note: "Saw " + n + " → its count is now " + freq[n] + ".", aux: { freq: fmtFreq() } });
    }

    // Phase 2 — bucket by frequency.
    var buckets = [];
    for (var b = 0; b <= nums.length; b++) buckets.push([]);
    Object.keys(freq).forEach(function (key) { buckets[freq[key]].push(Number(key)); });
    var bucketView = function () {
      return buckets.map(function (arr) { return arr.length ? "[" + arr.join(",") + "]" : "·"; });
    };
    rec.step({ line: 4, type: "array", values: bucketView(), pointers: {}, note: "Phase 2: bucket[f] (index row below = frequency f) holds the values seen exactly f times. The rightmost non-empty bucket is the most frequent.", aux: { freq: fmtFreq() } });

    // Phase 3 — collect top k, scanning high frequency → low.
    var result = [];
    for (var f = buckets.length - 1; f >= 0 && result.length < k; f--) {
      if (buckets[f].length === 0) continue;
      for (var bi = 0; bi < buckets[f].length; bi++) {
        var num = buckets[f][bi];
        result.push(num);
        rec.step({ line: 9, type: "array", values: bucketView(), pointers: { f: f }, hi: [f], note: "Bucket f=" + f + " is non-empty → pick " + num + " (appears " + f + " times). Collected " + result.length + " of " + k + ".", aux: { picked: "[" + result.join(",") + "]" } });
        if (result.length === k) break;
      }
    }
    rec.step({ line: 11, type: "array", values: bucketView(), pointers: {}, note: "Collected k=" + k + " values → answer is [" + result.join(", ") + "].", aux: { answer: "[" + result.join(", ") + "]" } });
  }
});
</script>


<script type="text/markdown" id="vz-readme">
## Problem
Return the `k` most frequent elements (in any order).

```
nums = [1,1,1,2,2,3], k = 2  ->  [1, 2]
```

## 🧐 In plain English
*Frequency* just means how many times a value appears in the list. Count how often each value shows up, then hand back the `k` values that appear most often. In the example, `1` appears 3 times and `2` appears twice, so the two most frequent values are `1` and `2`.

- **You're given:** an array `nums` and an integer `k`.
- **Return:** an array of the `k` values (the elements themselves, not their counts or positions) that occur most frequently.
- **Rules / guarantees:** the answer is unique — there's never a tie that makes the top `k` ambiguous, and `k` is always valid for the input.
- **Watch out for:** you return the *values*, not their frequencies, and the output can be in any order.

## The idea 💡
Counting frequencies is the easy half (one hash map). The interesting half is
selecting the top `k` **without** a full sort.

Key insight: **a value's frequency is at most `n`** (the array length). That
bounded range is exactly when **bucket / counting sort** shines. Make `n + 1`
buckets indexed by frequency; drop each value into its frequency's bucket. Then
sweep buckets from the highest frequency downward and take the first `k`.

| Approach | Time | Note |
|----------|------|------|
| Sort by frequency | `O(n log n)` | simplest to write |
| Min-heap of size k | `O(n log k)` | classic interview answer |
| **Bucket sort (this)** | **`O(n)`** | optimal; uses the bounded-frequency trick |

## Walkthrough
`nums = [1,1,1,2,2,3]`, `k = 2`

```
counts:  {1:3, 2:2, 3:1}

buckets (index = frequency):
  f: 0   1     2     3
     []  [3]   [2]   [1]

sweep from f=6 down:
  f=3 -> take 1   (result = [1])
  f=2 -> take 2   (result = [1,2])  -> length == k, stop
```

## Complexity
| | |
|---|---|
| **Time**  | `O(n)` — counting + bucket fill + single bucket sweep |
| **Space** | `O(n)` — frequency map plus `n + 1` buckets |
