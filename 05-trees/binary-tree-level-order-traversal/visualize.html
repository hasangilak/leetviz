<script src="../../viz/viz.js"></script>
<script>
Viz.create({
  title: "Binary Tree Level Order Traversal",
  subtitle: "#102 · Medium · BFS, one level (frontier) at a time",
  url: "https://leetcode.com/problems/binary-tree-level-order-traversal/",
  code: [
    "function levelOrder(root) {",
    "  const result = [];",
    "  if (root === null) return result;",
    "  let frontier = [root];",
    "  while (frontier.length > 0) {",
    "    result.push(frontier.map(n => n.val));",
    "    const next = [];",
    "    for (const node of frontier) {",
    "      if (node.left) next.push(node.left);",
    "      if (node.right) next.push(node.right);",
    "    }",
    "    frontier = next;",
    "  }",
    "  return result;",
    "}"
  ],
  build: function (rec) {
    var N = function (v, l, r) { return { v: v, l: l || null, r: r || null }; };
    // [3,9,20,null,null,15,7]
    var root = N(3, N(9), N(20, N(15), N(7)));
    var visited = {};
    function snapshot(line, note, frontier, result) {
      var inFrontier = {};
      (frontier || []).forEach(function (n) { inFrontier[n.v] = true; });
      var mk = function (n) {
        if (!n) return null;
        var state = null;
        if (inFrontier[n.v]) state = "instack";
        else if (visited[n.v]) state = "visited";
        return { label: n.v, state: state, children: [mk(n.l), mk(n.r)] };
      };
      rec.step({ line: line, type: "tree", root: mk(root), note: note, aux: { levels: JSON.stringify(result) } });
    }
    var result = [];
    snapshot(2, "BFS visits nodes nearest the root first. We process the tree one frontier (level) at a time, collecting their values.", [], result);

    var frontier = [root];
    snapshot(4, "Seed the frontier with just the root [" + root.v + "]. The current level is highlighted.", frontier, result);

    while (frontier.length > 0) {
      var vals = frontier.map(function (n) { return n.v; });
      result.push(vals);
      snapshot(6, "Snapshot this whole level: push [" + vals.join(", ") + "] into result.", frontier, result);

      var next = [];
      for (var i = 0; i < frontier.length; i++) {
        var node = frontier[i];
        if (node.l) next.push(node.l);
        if (node.r) next.push(node.r);
      }
      snapshot(8, "Gather the children of [" + vals.join(", ") + "] to form the next frontier" +
        (next.length ? ": [" + next.map(function (n) { return n.v; }).join(", ") + "]." : " (none — leaves)."), frontier, result);

      // mark this level done
      frontier.forEach(function (n) { visited[n.v] = true; });
      frontier = next;
      snapshot(12, frontier.length
        ? "Advance: the children become the new frontier. Loop again."
        : "New frontier is empty — the while loop will now exit.", frontier, result);
    }
    snapshot(15, "All levels collected. Return result = " + JSON.stringify(result) + ".", [], result);
  }
});
</script>


<script type="text/markdown" id="vz-readme">
## Problem
Return values grouped **by level**, top→bottom, left→right.

```
    3
   / \
  9  20          -> [[3], [9, 20], [15, 7]]
    /  \
   15   7
```

## 🧐 In plain English
Picture the tree in rows: the root is row 0, its children are row 1, their children are row 2, and so on. "Level order" means reading the tree row by row from top to bottom, and within each row from left to right (this is also called a *breadth-first* walk). You collect each row into its own list.

- **You're given:** the `root` node of a binary tree (or `null` if it's empty).
- **Return:** a list of lists — one inner list per level, holding that level's node values left-to-right (e.g. `[[3], [9, 20], [15, 7]]`).
- **Rules / guarantees:** an empty tree returns an empty list `[]`.
- **Watch out for:** keep each level separate — don't flatten everything into one big list, and preserve the left-to-right order within each level.

## The idea 💡
**Breadth-First Search** naturally walks a tree level by level using a queue.
The only addition is *grouping*: process the queue **one whole level at a time**.

Snapshot the current frontier (all nodes at this depth), record their values,
then build the next frontier from their children. Repeat until empty.

```
frontier = [root]
while frontier not empty:
    record values of frontier         // this is one level
    frontier = all children of frontier
```

## Walkthrough
```
frontier [3]        -> record [3]        children -> [9, 20]
frontier [9, 20]    -> record [9, 20]    children -> [15, 7]
frontier [15, 7]    -> record [15, 7]    children -> []
frontier []         -> stop

result = [[3], [9, 20], [15, 7]]
```

## DFS alternative
You *can* do this with DFS by passing a `depth` parameter and appending to
`result[depth]`. BFS is the more natural fit and the standard answer.

## Complexity
| | |
|---|---|
| **Time**  | `O(n)` — each node handled once |
| **Space** | `O(n)` — output + the widest level in the queue (up to ~n/2 nodes) |

> Note: using `Array.shift()` as a queue is O(n) per call (O(n²) total). The
> "swap the whole frontier" style here avoids that and stays O(n).
