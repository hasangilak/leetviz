<script>
Viz.create({
  title: "Kth Largest Element in a Stream",
  subtitle: "#703 · Easy · keep a size-k MIN-heap; its root is the k-th largest",
  url: "https://leetcode.com/problems/kth-largest-element-in-a-stream/",
  code: [
    "add(val) {",
    "  this.heap.push(val);              // min-heap",
    "  if (this.heap.size() > this.k)",
    "    this.heap.pop();               // drop smallest beyond top-k",
    "  return this.heap.peek();          // root = k-th largest",
    "}"
  ],
  build: function (rec) {
    var k = 3;

    // --- min-heap (a < b => smallest floats to root), mirrors solution.ts ---
    var data = [];
    function less(a, b) { return a < b; }
    function bubbleUp(i) {
      while (i > 0) {
        var p = (i - 1) >> 1;
        if (!less(data[i], data[p])) break;
        var t = data[i]; data[i] = data[p]; data[p] = t;
        i = p;
      }
    }
    function bubbleDown() {
      var i = 0, n = data.length;
      while (true) {
        var best = i, l = 2 * i + 1, r = 2 * i + 2;
        if (l < n && less(data[l], data[best])) best = l;
        if (r < n && less(data[r], data[best])) best = r;
        if (best === i) break;
        var t = data[i]; data[i] = data[best]; data[best] = t;
        i = best;
      }
    }
    function push(v) { data.push(v); bubbleUp(data.length - 1); }
    function pop() {
      var top = data[0], last = data.pop();
      if (last !== undefined && data.length > 0) { data[0] = last; bubbleDown(); }
      return top;
    }

    function snap(line, note, extraAux) {
      var aux = { k: k };
      if (extraAux) for (var key in extraAux) aux[key] = extraAux[key];
      rec.step({
        line: line, type: "array",
        values: data.slice(),
        hi: data.length ? [0] : [],
        note: note, aux: aux
      });
    }

    // constructor: add each of the initial nums (silently building the heap)
    var init = [4, 5, 8, 2];
    function addSilent(val) { push(val); if (data.length > k) pop(); }

    function add(val, intro) {
      snap(1, intro + " — push " + val + " into the min-heap, then bubble it up.");
      push(val);
      snap(2, "After push: heap = [" + data.join(", ") + "]. (Min-heap: parent ≤ children, so the smallest sits at index 0.)");
      if (data.length > k) {
        snap(3, "Heap size " + data.length + " > k = " + k + " → the root (" + data[0] + ") is the smallest of the top values and can never be the k-th largest, so pop it.");
        pop();
        snap(4, "After pop + re-heapify: heap = [" + data.join(", ") + "]. Exactly k = " + k + " of the largest values remain.");
      } else {
        snap(3, "Heap size " + data.length + " ≤ k = " + k + " → nothing to drop yet.");
      }
      var root = data[0];
      snap(5, "Return the root = " + root + " — the " + k + "rd largest seen so far.", { returned: root });
    }

    // constructor seeds the heap from init; we start the animation here.
    for (var ii = 0; ii < init.length; ii++) addSilent(init[ii]);
    snap(2, "Constructor done: streamed [4, 5, 8, 2] through the size-" + k + " min-heap. Heap = [" + data.join(", ") + "] holds the " + k + " largest; root " + data[0] + " is the current " + k + "rd largest.");

    add(3, "Stream: add(3)");
    add(5, "Stream: add(5)");
    add(10, "Stream: add(10)");
    add(9, "Stream: add(9)");
  }
});
</script>


<script type="text/markdown" id="vz-readme">
## Problem
Build a class `KthLargest(k, nums)` whose `add(val)` returns the **k-th largest**
element among everything added so far (initial `nums` + later `add`s).

```
KthLargest(3, [4,5,8,2])
add(3)  -> 4      add(5)  -> 5
add(10) -> 5      add(9)  -> 8      add(4) -> 8
```

## 🧐 In plain English
You're building a running scoreboard that, after every new number arrives, can instantly tell you the **k-th largest** value seen so far. "k-th largest" means: line up everything in descending order and take the value at position `k` (e.g. with `k=3`, it's the 3rd-biggest, *not* the maximum).

You implement a class with these operations:
- `KthLargest(k, nums)` — constructor: remember `k` and seed the scoreboard with the starting array `nums`.
- `add(val)` — add a new number to the pool, then return the k-th largest value across *all* numbers added so far (the original `nums` plus every `add` to date).

- **The hard part:** results must stay correct as the pool keeps growing across many `add` calls, and you can't afford to re-sort everything each time. Duplicates count as separate values, and the pool is always guaranteed to hold at least `k` numbers.

## Heap refresher 🌳
A **binary heap** is a complete tree kept in an array where every parent beats
its children by some rule. A **min-heap** keeps the *minimum* at the root.
`push`/`pop` are `O(log n)`, `peek` is `O(1)`.

## The idea 💡 (the counter-intuitive part)
To track the k-th **largest**, keep a **min-heap of size k** holding the k
largest values seen so far.

Why min-heap? The k-th largest value is the *smallest* member of the "top k"
club. A min-heap exposes that smallest member at its root in O(1). Each `add`:

1. push the new value,
2. if the heap now holds more than `k`, pop the root (the smallest of the
   candidates — it can't be the k-th largest),
3. return the root.

We never store more than `k + 1` items, so it's cheap and memory-light.

## Walkthrough — `KthLargest(3, [4,5,8,2])`, then `add(3)`
```
build (keep 3 largest):
  push4 -> [4]
  push5 -> [4,5]
  push8 -> [4,5,8]
  push2 -> size 4 > 3 -> pop min(2) -> [4,5,8]   root=4

add(3): push3 -> size 4 -> pop min(3) -> [4,5,8] root=4  -> returns 4 ✅
```

## Complexity
| | |
|---|---|
| **`add`** | `O(log k)` |
| **Space** | `O(k)` — heap never exceeds k (+1 transiently) |
