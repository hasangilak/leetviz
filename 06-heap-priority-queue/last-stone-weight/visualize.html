<script src="../../viz/viz.js"></script>
<script>
Viz.create({
  title: "Last Stone Weight",
  subtitle: "#1046 · Easy · MAX-heap; smash the two heaviest stones until ≤ 1 remains",
  url: "https://leetcode.com/problems/last-stone-weight/",
  code: [
    "for (const s of stones) maxHeap.push(s);",
    "while (maxHeap.size() > 1) {",
    "  const heaviest = maxHeap.pop();",
    "  const next = maxHeap.pop();",
    "  if (heaviest !== next)",
    "    maxHeap.push(heaviest - next);",
    "}",
    "return maxHeap.size() === 1 ? maxHeap.peek() : 0;"
  ],
  build: function (rec) {
    var stones = [2, 7, 4, 1, 8, 1];

    // --- max-heap (a > b => largest floats to root), mirrors solution.ts ---
    var data = [];
    function less(a, b) { return a > b; } // "less" = higher priority = larger
    function bubbleUp(i) {
      while (i > 0) {
        var p = (i - 1) >> 1;
        if (!less(data[i], data[p])) break;
        var t = data[i]; data[i] = data[p]; data[p] = t;
        i = p;
      }
    }
    function bubbleDown() {
      var i = 0, n = data.length;
      while (true) {
        var best = i, l = 2 * i + 1, r = 2 * i + 2;
        if (l < n && less(data[l], data[best])) best = l;
        if (r < n && less(data[r], data[best])) best = r;
        if (best === i) break;
        var t = data[i]; data[i] = data[best]; data[best] = t;
        i = best;
      }
    }
    function push(v) { data.push(v); bubbleUp(data.length - 1); }
    function pop() {
      var top = data[0], last = data.pop();
      if (last !== undefined && data.length > 0) { data[0] = last; bubbleDown(); }
      return top;
    }

    function snap(line, note, hi, extraAux) {
      var aux = { stones: data.length };
      if (extraAux) for (var key in extraAux) aux[key] = extraAux[key];
      rec.step({
        line: line, type: "array",
        values: data.slice(),
        hi: hi || [],
        note: note, aux: aux
      });
    }

    // build the heap
    for (var i = 0; i < stones.length; i++) push(stones[i]);
    snap(1, "Push all stones into a MAX-heap: [" + data.join(", ") + "]. The heaviest stone is always at index 0.", [0]);

    var round = 1;
    while (data.length > 1) {
      snap(2, "Round " + round + ": more than one stone remains — smash the two heaviest. The top two by priority are " + data[0] + " and the larger of its children.", [0]);
      var heaviest = pop();
      snap(3, "Pop the heaviest = " + heaviest + ". Heap re-heapifies to [" + data.join(", ") + "].", data.length ? [0] : [], { heaviest: heaviest });
      var next = pop();
      snap(4, "Pop the next heaviest = " + next + ". Heap is now [" + data.join(", ") + "].", data.length ? [0] : [], { heaviest: heaviest, next: next });
      if (heaviest !== next) {
        var diff = heaviest - next;
        snap(5, "They differ: smash result = " + heaviest + " − " + next + " = " + diff + ". Push the survivor back.", [], { smash: heaviest + " − " + next + " = " + diff });
        push(diff);
        snap(6, "After pushing " + diff + ": heap = [" + data.join(", ") + "].", [0], { smash: diff });
      } else {
        snap(5, "Equal weights (" + heaviest + " = " + next + "): both stones are destroyed, nothing pushed back.", [], { smash: 0 });
      }
      round++;
    }

    var ans = data.length === 1 ? data[0] : 0;
    snap(8, "≤ 1 stone left. Answer = " + (data.length === 1 ? "the last stone = " + ans : "no stones, so 0") + ".", data.length ? [0] : [], { answer: ans });
  }
});
</script>


<script type="text/markdown" id="vz-readme">
## Problem
Each turn, take the **two heaviest** stones and smash them:
- equal → both shatter.
- unequal → the heavier loses the lighter's weight (`x - y` survives).

Return the last stone's weight, or `0` if none remain.

```
[2,7,4,1,8,1]
 smash 8,7 -> 1     stones: [2,4,1,1,1]
 smash 4,2 -> 2     stones: [2,1,1,1]
 smash 2,1 -> 1     stones: [1,1,1]
 smash 1,1 -> 0     stones: [1]
 -> 1
```

## 🧐 In plain English
You have a bag of stones, each with a weight (a positive integer). Repeatedly grab the **two heaviest** stones and smash them together: if they weigh the same, both are destroyed; if not, the lighter one is destroyed and the heavier one is left with the *difference* in weight. Keep going until one stone (or none) is left.

- **You're given:** an array `stones` of positive integers (their weights).
- **Return:** the weight of the single remaining stone, or `0` if all stones are destroyed.
- **Rules / guarantees:** each smash uses the two currently-largest stones; equal weights cancel out completely; otherwise `heavier - lighter` becomes a new stone back in the bag.
- **Watch out for:** after a smash, the leftover stone re-enters the pool and may itself become one of the next "two heaviest" — so you can't just sort once.

## The idea 💡
The operation always needs the **two largest** current stones. Re-sorting the
array every turn is `O(n² log n)`. A **max-heap** gives the maximum in O(1) and
re-balances in O(log n) after each change — perfect for "repeatedly grab the
biggest."

```
while heap has ≥ 2 stones:
    a = pop max
    b = pop max
    if a != b: push (a - b)
return heap.size==1 ? top : 0
```

> JS has no built-in heap, so the file ships a tiny one. A **max-heap** is just a
> min-heap with the comparator flipped (`a > b` instead of `a < b`).

## Walkthrough
```
heap (max): [8,7,4,2,1,1]
pop 8, pop 7 -> push 1     heap: [4,2,1,1,1]
pop 4, pop 2 -> push 2     heap: [2,1,1,1]
pop 2, pop 1 -> push 1     heap: [1,1,1]
pop 1, pop 1 -> equal, nothing pushed   heap: [1]
size 1 -> return 1 ✅
```

## Complexity
| | |
|---|---|
| **Time**  | `O(n log n)` — ≤ n smashes × O(log n) heap ops (+ O(n) build) |
| **Space** | `O(n)` — the heap |
